[alembic]
# The path to the alembic versions folder (migration files)
script_location = alembic

# We leave sqlalchemy.url BLANK here intentionally.
# The actual DB URL is read from our .env file inside env.py.
# This is the correct pattern — never hardcode credentials in alembic.ini.
sqlalchemy.url =

# Filename format for new migration files
# Example output: 20240101_120000_create_users_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s


[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
